theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
  - admonition

plugins:
  - search

